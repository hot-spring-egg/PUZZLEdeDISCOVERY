<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>パズルdeディスカバリー</title>
  <!-- 必要なライブラリの読み込み -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- ★紙吹雪アニメーション用のライブラリを追加 -->
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  
  <!-- 丸みのある優しいフォントを読み込み -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=M+PLUS+Rounded+1c:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    body {
      font-family: 'M PLUS Rounded 1c', sans-serif;
      background-color: #F4F1DE; /* クリーム色の背景 */
      margin: 0;
      padding: 0;
      /* スワイプ操作で前のページに戻るなどのデフォルト動作を防ぐ */
      overscroll-behavior-y: none;
    }
    
    /* パズルボード上でのスクロールを防ぐ（タッチ操作用） */
    .touch-none {
      touch-action: none;
    }

    /* ★文字が飛び出すアニメーション */
    @keyframes popOut {
      0% { transform: scale(0.1) rotate(-10deg); opacity: 0; }
      60% { transform: scale(1.2) rotate(5deg); opacity: 1; }
      80% { transform: scale(0.9) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    .animate-pop-out {
      animation: popOut 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // ★先生へ：ここでパズルにしたい画像を登録します。
    // urlの部分を、使いたい画像のURLに書き換えてください。
    const PRESET_IMAGES = [
      { id: 'img1', title: 'やさいたち', url: 'https://thumb.photo-ac.com/8e/8e7fcbecb2faa80ec2498e76cf84f540_t.jpeg' },
      { id: 'img2', title: '春のおとずれ', url: 'https://myhome-style.com/column/parts/detail/images/250123430767_01.jpg' },
      { id: 'img3', title: '関ヶ原の戦い', url: 'https://www.nippon.com/ja/ncommon/contents/japan-topics/2486628/2486628.jpg' },
      { id: 'img4', title: 'スイミー', url: 'https://gigaplus.makeshop.jp/kyuryudo/artwork/leo-sw01-1.jpg' }
    ];

    // ジグソーパズルのパスを生成する関数
    const createJigsawPath = (w, h, tabs) => {
      const baseSize = Math.min(w, h);
      const tx = baseSize * 0.18;
      const ty = baseSize * 0.18;
      
      let path = `M 0,0 `;
      
      if (tabs.top === 0) {
        path += `L ${w},0 `;
      } else {
        const s = tabs.top;
        path += `L ${w/2 - tx},0 `;
        path += `C ${w/2 - tx*0.2},${-s*ty*0.2} ${w/2 - tx*1.2},${-s*ty} ${w/2},${-s*ty} `;
        path += `C ${w/2 + tx*1.2},${-s*ty} ${w/2 + tx*0.2},${-s*ty*0.2} ${w/2 + tx},0 `;
        path += `L ${w},0 `;
      }

      if (tabs.right === 0) {
        path += `L ${w},${h} `;
      } else {
        const s = tabs.right;
        path += `L ${w},${h/2 - tx} `;
        path += `C ${w + s*ty*0.2},${h/2 - tx*0.2} ${w + s*ty},${h/2 - tx*1.2} ${w + s*ty},${h/2} `;
        path += `C ${w + s*ty},${h/2 + tx*1.2} ${w + s*ty*0.2},${h/2 + tx*0.2} ${w},${h/2 + tx} `;
        path += `L ${w},${h} `;
      }

      if (tabs.bottom === 0) {
        path += `L 0,${h} `;
      } else {
        const s = tabs.bottom;
        path += `L ${w/2 + tx},${h} `;
        path += `C ${w/2 + tx*0.2},${h + s*ty*0.2} ${w/2 + tx*1.2},${h + s*ty} ${w/2},${h + s*ty} `;
        path += `C ${w/2 - tx*1.2},${h + s*ty} ${w/2 - tx*0.2},${h + s*ty*0.2} ${w/2 - tx},${h} `;
        path += `L 0,${h} `;
      }

      if (tabs.left === 0) {
        path += `L 0,0 `;
      } else {
        const s = tabs.left;
        path += `L 0,${h/2 + tx} `;
        path += `C ${-s*ty*0.2},${h/2 + tx*0.2} ${-s*ty},${h/2 + tx*1.2} ${-s*ty},${h/2} `;
        path += `C ${-s*ty},${h/2 - tx*1.2} ${-s*ty*0.2},${h/2 - tx*0.2} 0,${h/2 - tx} `;
        path += `L 0,0 `;
      }

      path += `Z`;
      return path;
    };

    // ==========================================
    // 1. 初期設定画面（SetupScreen）
    // ==========================================
    const SetupScreen = ({ imageSrc, setImageSrc, grid, setGrid, allowOutside, setAllowOutside, onStart }) => {
      // 難易度の選択肢
      const difficulties = [
        { label: 'かんたん (4×4)', rows: 4, cols: 4 },
        { label: 'ふつう (5×5)', rows: 5, cols: 5 },
        { label: 'むずかしい (6×6)', rows: 6, cols: 6 },
        { label: 'とてもむずかしい (7×7)', rows: 7, cols: 7 },
        { label: 'ちょうせん (8×8)', rows: 8, cols: 8 },
        { label: 'おに (9×9)', rows: 9, cols: 9 },
      ];

      return (
        <div className="w-full max-w-2xl bg-white/90 backdrop-blur p-6 md:p-10 rounded-[2rem] shadow-xl border-4 border-[#d1cdb3]">
          <h1 className="text-3xl md:text-4xl font-bold text-[#3D405B] mb-8 text-center leading-relaxed">
            パズルdeディスカバリー
          </h1>

          <div className="mb-8">
            <h2 className="text-xl font-bold text-[#3D405B] mb-4">1. しゃしんを えらぶ</h2>
            <div className="grid grid-cols-2 sm:grid-cols-4 gap-3">
              {PRESET_IMAGES.map((img) => (
                <button
                  key={img.id}
                  onClick={() => setImageSrc(img.url)}
                  className={`p-2 rounded-xl border-4 transition-all active:scale-95 flex flex-col items-center gap-2 ${
                    imageSrc === img.url 
                      ? 'border-[#E0A96D] bg-[#E0A96D]/20 shadow-md transform -translate-y-1' 
                      : 'border-[#d1cdb3] bg-white hover:bg-[#F4F1DE]'
                  }`}
                >
                  <img src={img.url} alt={img.title} className="w-full h-20 md:h-24 object-cover rounded-lg shadow-sm" />
                  <span className="font-bold text-[#3D405B] text-sm">{img.title}</span>
                </button>
              ))}
            </div>
          </div>

          <div className="mb-10">
            <h2 className="text-xl font-bold text-[#3D405B] mb-4">2. むずかしさを えらぶ</h2>
            <div className="grid grid-cols-2 sm:grid-cols-3 gap-3">
              {difficulties.map((d, i) => (
                <button
                  key={i}
                  onClick={() => setGrid({ rows: d.rows, cols: d.cols })}
                  className={`p-3 rounded-xl font-bold text-sm md:text-base border-4 transition-transform active:scale-95 ${
                    grid.rows === d.rows 
                      ? 'border-[#E0A96D] bg-[#E0A96D] text-white shadow-md' 
                      : 'border-[#d1cdb3] bg-white text-[#3D405B] hover:bg-[#F4F1DE]'
                  }`}
                >
                  {d.label}
                </button>
              ))}
            </div>
          </div>

          <div className="mb-10">
            <h2 className="text-xl font-bold text-[#3D405B] mb-4">3. ピースのおきばしょ</h2>
            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
              <button
                onClick={() => setAllowOutside(false)}
                className={`p-4 rounded-xl font-bold text-lg border-4 transition-transform active:scale-95 ${
                  !allowOutside 
                    ? 'border-[#E0A96D] bg-[#E0A96D] text-white shadow-md' 
                    : 'border-[#d1cdb3] bg-white text-[#3D405B] hover:bg-[#F4F1DE]'
                }`}
              >
                枠の中だけ
              </button>
              <button
                onClick={() => setAllowOutside(true)}
                className={`p-4 rounded-xl font-bold text-lg border-4 transition-transform active:scale-95 ${
                  allowOutside 
                    ? 'border-[#E0A96D] bg-[#E0A96D] text-white shadow-md' 
                    : 'border-[#d1cdb3] bg-white text-[#3D405B] hover:bg-[#F4F1DE]'
                }`}
              >
                枠の外もつかう
              </button>
            </div>
          </div>

          <button
            onClick={onStart}
            disabled={!imageSrc}
            className={`w-full py-5 rounded-2xl text-2xl font-bold transition-all ${
              imageSrc 
                ? 'bg-[#81B29A] text-white shadow-[0_6px_0_#5a8570] hover:-translate-y-1 hover:shadow-[0_8px_0_#5a8570] active:translate-y-2 active:shadow-none cursor-pointer' 
                : 'bg-gray-300 text-gray-500 cursor-not-allowed'
            }`}
          >
            ゲームスタート！
          </button>
        </div>
      );
    }

    // ==========================================
    // 2. パズルプレイ画面（PuzzleBoard）
    // ==========================================
    const PuzzleBoard = ({ imageSrc, grid, allowOutside, onClear, onBack }) => {
      const boardRef = useRef(null);
      const startTimeRef = useRef(null); // ★スタート時間を記録するタイマー
      const [pieces, setPieces] = useState([]);
      const [draggingId, setDraggingId] = useState(null);
      const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
      const [imageRatio, setImageRatio] = useState(1);
      const [isClearing, setIsClearing] = useState(false);
      const [error, setError] = useState('');

      const { rows, cols } = grid;

      // 画像の読み込みとピースの初期配置
      useEffect(() => {
        const img = new Image();
        img.onload = () => {
          setImageRatio(img.width / img.height);
          
          const iw = img.width;
          const ih = img.height;
          const bw = iw / cols;
          const bh = ih / rows;
          
          const baseSize = Math.min(bw, bh);
          const margin = baseSize * 0.3; // タブがはみ出す分の余白
          
          // 境界の凸凹を決定 (1: 凸, -1: 凹)
          const hEdges = []; 
          for (let r = 0; r < rows - 1; r++) {
            let row = [];
            for (let c = 0; c < cols; c++) {
              row.push(Math.random() > 0.5 ? 1 : -1);
            }
            hEdges.push(row);
          }
          const vEdges = [];
          for (let r = 0; r < rows; r++) {
            let row = [];
            for (let c = 0; c < cols - 1; c++) {
              row.push(Math.random() > 0.5 ? 1 : -1);
            }
            vEdges.push(row);
          }
          
          // ★枠外用のスロット生成（画面全体のサイズから逆算し、絶対にスクロールしない範囲を割り出す）
          const slots = [];
          if (allowOutside) {
            const vvw = window.innerWidth;
            const vvh = window.innerHeight;
            const imgRatio = iw / ih;

            // 枠の表示サイズを推定 (width: 60%, maxHeight: 55vh に拡大)
            let boardW = vvw * 0.60;
            let boardH = boardW / imgRatio;
            if (boardH > vvh * 0.55) {
              boardH = vvh * 0.55;
              boardW = boardH * imgRatio;
            }

            // 画面全体の利用可能領域（ヘッダー等を除いたピクセル数）
            const safeTop = 90; // ヘッダー分
            const safeBottom = 30; // 下部余白
            const safeLeft = 10; // 左余白
            const safeRight = 10; // 右余白

            const availableW = vvw - safeLeft - safeRight;
            const availableH = vvh - safeTop - safeBottom;

            // 枠は中央に配置されると仮定
            const boardLeft = safeLeft + (availableW - boardW) / 2;
            const boardTop = safeTop + (availableH - boardH) / 2;

            const pw = 100 / cols;
            const ph = 100 / rows;
            
            // 画面の安全領域を、パズル枠に対するパーセント座標に変換
            const minX_pct = ((safeLeft - boardLeft) / boardW) * 100;
            const maxX_pct = ((safeLeft + availableW - boardW * (1/cols) - boardLeft) / boardW) * 100;
            const minY_pct = ((safeTop - boardTop) / boardH) * 100;
            const maxY_pct = ((safeTop + availableH - boardH * (1/rows) - boardTop) / boardH) * 100;

            // スロットを生成（ピースを広げる間隔）
            const stepX = pw * 1.1; 
            const stepY = ph * 1.1;

            for (let x = minX_pct; x <= maxX_pct; x += stepX) {
              for (let y = minY_pct; y <= maxY_pct; y += stepY) {
                // パズルの枠内（+少しの余白）はピースで隠さないように避ける
                if (x > -pw * 0.5 && x < 100 && y > -ph * 0.5 && y < 100) {
                  continue;
                }
                slots.push({x, y});
              }
            }
            
            // それでもスロット数がピース数に満たない場合のフェイルセーフ（少し密に詰める）
            if (slots.length < rows * cols) {
               for (let x = minX_pct; x <= maxX_pct; x += stepX * 0.7) {
                 for (let y = minY_pct; y <= maxY_pct; y += stepY * 0.7) {
                   slots.push({x, y});
                 }
               }
            }

            // スロットをランダムにシャッフル
            for(let i = slots.length - 1; i > 0; i--){
              const j = Math.floor(Math.random() * (i + 1));
              [slots[i], slots[j]] = [slots[j], slots[i]];
            }
          }

          const initialPieces = [];
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              const tabs = {
                top: r === 0 ? 0 : -hEdges[r - 1][c],
                bottom: r === rows - 1 ? 0 : hEdges[r][c],
                left: c === 0 ? 0 : -vEdges[r][c - 1],
                right: c === cols - 1 ? 0 : vEdges[r][c]
              };
              
              const pctW = (bw + margin * 2) / iw * 100;
              const pctH = (bh + margin * 2) / ih * 100;
              const baseX = (c * bw - margin) / iw * 100;
              const baseY = (r * bh - margin) / ih * 100;

              let initialX, initialY;
              if (allowOutside && slots.length > 0) {
                // 事前計算したスロットから取り出し、自然に見えるよう少しだけ位置をずらす
                const slot = slots.pop();
                const jitterX = (Math.random() - 0.5) * (100 / cols * 0.1);
                const jitterY = (Math.random() - 0.5) * (100 / rows * 0.1);
                initialX = slot.x + jitterX;
                initialY = slot.y + jitterY;
              } else {
                // 枠内モード：ボードの内側に散らばらせる
                initialX = Math.random() * (100 - pctW);
                initialY = Math.random() * (100 - Math.max(pctH, 10));
              }

              initialPieces.push({
                id: `${r}-${c}`,
                row: r,
                col: c,
                tabs,
                pctW,
                pctH,
                baseX,
                baseY,
                x: initialX,
                y: initialY,
                isPlaced: false,
                zIndex: 10,
                svgViewBox: `${-margin} ${-margin} ${bw + margin * 2} ${bh + margin * 2}`,
                imageWidth: iw,
                imageHeight: ih,
                imgX: -c * bw,
                imgY: -r * bh,
                pathD: createJigsawPath(bw, bh, tabs)
              });
            }
          }
          
          // 描画順もランダムにするためシャッフル
          for(let i = initialPieces.length - 1; i > 0; i--){
            const j = Math.floor(Math.random() * (i + 1));
            [initialPieces[i], initialPieces[j]] = [initialPieces[j], initialPieces[i]];
          }
          
          setPieces(initialPieces);
          startTimeRef.current = Date.now(); // ★ピースが配置された瞬間にタイマースタート
        };
        img.onerror = () => {
          setError('がぞうが よみこめませんでした。');
        };
        img.src = imageSrc;
      }, [imageSrc, rows, cols, allowOutside]); // allowOutsideも依存配列に追加

      // クリア判定
      useEffect(() => {
        if (pieces.length > 0 && pieces.every(p => p.isPlaced) && !isClearing) {
          setIsClearing(true);
          
          // ★紙吹雪を両端から打ち上げる（北欧カラー）
          if (window.confetti) {
            const duration = 2000;
            const animationEnd = Date.now() + duration;
            const colors = ['#E07A5F', '#81B29A', '#E0A96D', '#3D405B', '#ffffff'];

            (function frame() {
              confetti({
                particleCount: 5,
                angle: 60,
                spread: 55,
                origin: { x: 0, y: 0.8 },
                colors: colors,
                zIndex: 9999
              });
              confetti({
                particleCount: 5,
                angle: 120,
                spread: 55,
                origin: { x: 1, y: 0.8 },
                colors: colors,
                zIndex: 9999
              });

              if (Date.now() < animationEnd) {
                requestAnimationFrame(frame);
              }
            }());
          }

          // ★かかった時間を計算（秒）
          const endTime = Date.now();
          const timeTaken = Math.floor((endTime - startTimeRef.current) / 1000);
          
          // 少し待ってからクリア画面へ移行
          setTimeout(() => {
            onClear(timeTaken); // ★クリア時間をAppに渡す
          }, 2500); // 演出を見るために少し待機時間を長く（1500 → 2500に変更）
        }
      }, [pieces, isClearing, onClear]);

      // ピースを掴んだとき（マウス・タッチ両対応）
      const handlePointerDown = (e, piece) => {
        if (piece.isPlaced || isClearing) return;
        
        // ボード内の相対座標(%)を計算
        const rect = boardRef.current.getBoundingClientRect();
        const pointerX = ((e.clientX - rect.left) / rect.width) * 100;
        const pointerY = ((e.clientY - rect.top) / rect.height) * 100;
        
        setDragOffset({
          x: pointerX - piece.x,
          y: pointerY - piece.y
        });
        setDraggingId(piece.id);
        
        // 掴んだピースを最前面にする
        setPieces(prev => {
          const maxZ = Math.max(...prev.map(p => p.zIndex), 0);
          return prev.map(p => p.id === piece.id ? { ...p, zIndex: maxZ + 1 } : p);
        });

        // 画面外に指が出ても追従させる
        e.target.setPointerCapture(e.pointerId);
      };

      // ピースを動かしているとき
      const handlePointerMove = (e) => {
        if (!draggingId || !boardRef.current || isClearing) return;
        
        const rect = boardRef.current.getBoundingClientRect();
        const pointerX = ((e.clientX - rect.left) / rect.width) * 100;
        const pointerY = ((e.clientY - rect.top) / rect.height) * 100;
        
        let newX = pointerX - dragOffset.x;
        let newY = pointerY - dragOffset.y;
        
        setPieces(prev => prev.map(p => p.id === draggingId ? { ...p, x: newX, y: newY } : p));
      };

      // ピースを離したとき（吸着判定）
      const handlePointerUp = (e) => {
        if (!draggingId) return;
        e.target.releasePointerCapture(e.pointerId);
        
        setPieces(prev => prev.map(p => {
          if (p.id !== draggingId) return p;
          
          // 正解の座標(%)
          const targetX = p.baseX;
          const targetY = p.baseY;
          
          // ピタッと吸い付く距離
          const dist = Math.sqrt(Math.pow(p.x - targetX, 2) + Math.pow(p.y - targetY, 2));
          const snapThreshold = (100 / Math.max(cols, rows)) * 0.4;
          
          if (dist < snapThreshold) {
            // 正解位置に置かれたら、zIndexを0にして一番下のレイヤーに下げる
            return { ...p, x: targetX, y: targetY, isPlaced: true, zIndex: 0 };
          }

          // ★「枠の中だけ」モードの時は、はみ出したピースを枠内に戻して消えないようにする
          if (!allowOutside) {
            let newX = p.x;
            let newY = p.y;
            // ピースが完全に見えなくなるのを防ぐため、少しのはみ出し(-10%程度)までは許容しつつ枠内に収める
            const minX = -10;
            const maxX = 110 - p.pctW;
            const minY = -10;
            const maxY = 110 - p.pctH;
            
            if (newX < minX) newX = minX;
            if (newX > maxX) newX = maxX;
            if (newY < minY) newY = minY;
            if (newY > maxY) newY = maxY;
            
            return { ...p, x: newX, y: newY };
          }

          return p;
        }));
        
        setDraggingId(null);
      };

      if (error) {
        return (
          <div className="flex flex-col items-center mt-10">
            <div className="bg-[#E07A5F]/20 text-[#E07A5F] font-bold p-4 rounded-xl mb-6">{error}</div>
            <button onClick={onBack} className="bg-white px-6 py-3 rounded-xl shadow-md text-[#3D405B] font-bold">もどる</button>
          </div>
        );
      }

      const placedCount = pieces.filter(p => p.isPlaced).length;

      // ★ここがパズル画面の1画面固定表示のための構造
      return (
        <div className="w-full h-full flex flex-col items-center">
          {/* ヘッダー部分 */}
          <div className="w-full flex justify-between items-center py-4 px-2 flex-shrink-0 z-10">
            <button 
              onClick={onBack}
              className="bg-white text-[#3D405B] px-5 py-3 rounded-xl font-bold shadow border-2 border-[#d1cdb3] hover:bg-[#E0A96D] hover:text-white hover:border-[#E0A96D] transition-colors"
            >
              ◀ やめる
            </button>
            <div className="text-base md:text-lg font-bold text-[#3D405B] bg-white/60 px-3 py-1.5 rounded-xl shadow-sm border border-white/50">
              できたピース：<span className="text-[#E0A96D] text-lg md:text-xl">{placedCount}</span> / {pieces.length}
            </div>
          </div>

          {/* パズルエリア */}
          <div className="relative w-full flex-1 flex justify-center items-center mb-4 md:mb-8">
            <div 
              ref={boardRef}
              // ★ overflow-visible を常に適用し、枠外に出てもピースが消えないようにする
              className={`relative bg-white/50 border-4 border-[#3D405B] rounded-md touch-none shadow-2xl overflow-visible`}
              style={{ 
                aspectRatio: imageRatio,
                // ★台紙のサイズを拡大。枠外モードは55vh・幅60%、枠内モードは限界の85vhまで大きくする。
                maxHeight: allowOutside ? '55vh' : '85vh', 
                width: allowOutside ? '60%' : '100%',     
                maxWidth: allowOutside ? `calc(55vh * ${imageRatio})` : `calc(85vh * ${imageRatio})`
              }}
            >
              {/* 下絵（薄く表示してヒントにする） */}
              <div 
                className="absolute inset-0 bg-cover bg-center opacity-20 pointer-events-none"
                style={{ backgroundImage: `url(${imageSrc})` }}
              ></div>

              {/* ピースの描画 */}
              {pieces.map(piece => (
                <div
                  key={piece.id}
                  onPointerDown={(e) => handlePointerDown(e, piece)}
                  onPointerMove={handlePointerMove}
                  onPointerUp={handlePointerUp}
                  onPointerCancel={handlePointerUp}
                  className={`absolute ${piece.isPlaced ? '' : 'cursor-grab active:cursor-grabbing hover:brightness-110'}`}
                  style={{
                    width: `${piece.pctW}%`,
                    height: `${piece.pctH}%`,
                    left: `${piece.x}%`,
                    top: `${piece.y}%`,
                    zIndex: piece.zIndex,
                    // ドラッグ中はアニメーションを切る（マウスに即追従させるため）
                    transition: draggingId === piece.id ? 'none' : 'left 0.2s cubic-bezier(0.34, 1.56, 0.64, 1), top 0.2s cubic-bezier(0.34, 1.56, 0.64, 1)',
                    filter: piece.isPlaced ? 'none' : 'drop-shadow(2px 4px 6px rgba(0,0,0,0.4))'
                  }}
                >
                  <svg viewBox={piece.svgViewBox} className="w-full h-full pointer-events-none">
                    <defs>
                      <clipPath id={`clip-${piece.id}`}>
                        <path d={piece.pathD} />
                      </clipPath>
                    </defs>
                    <image 
                      href={imageSrc}
                      x={piece.imgX} 
                      y={piece.imgY} 
                      width={piece.imageWidth} 
                      height={piece.imageHeight} 
                      clipPath={`url(#clip-${piece.id})`}
                      preserveAspectRatio="none"
                    />
                    <path 
                      d={piece.pathD} 
                      fill="none" 
                      stroke={isClearing ? "transparent" : "rgba(0,0,0,0.8)"} 
                      strokeWidth={isClearing ? 0 : 2} 
                      style={{ transition: 'stroke 1s ease, stroke-width 1s ease' }}
                    />
                  </svg>
                </div>
              ))}
            </div>
          </div>

          {/* ★クリア時のキラキラ演出（枠外の画面全体に飛び出る！） */}
          {isClearing && (
            <div className="fixed inset-0 flex items-center justify-center z-[100] pointer-events-none">
              <div className="absolute inset-0 bg-white/40 backdrop-blur-sm transition-opacity duration-500"></div>
              <span 
                className="animate-pop-out text-5xl md:text-8xl font-black text-[#E0A96D] relative z-10" 
                style={{ 
                  textShadow: '0 10px 25px rgba(0,0,0,0.3), 0 0 15px rgba(255,255,255,0.8), -3px -3px 0 #fff, 3px -3px 0 #fff, -3px 3px 0 #fff, 3px 3px 0 #fff'
                }}
              >
                よくできました！
              </span>
            </div>
          )}
        </div>
      );
    }

    // ==========================================
    // 3. クリア画面（ClearScreen）
    // ==========================================
    const ClearScreen = ({ imageSrc, timeTaken, onRetry, onReset }) => {
      return (
        <div className="w-full max-w-3xl flex flex-col items-center bg-white/90 backdrop-blur p-8 rounded-[2rem] shadow-xl border-4 border-[#d1cdb3] text-center my-auto">
          <h2 className="text-4xl md:text-5xl font-bold text-[#E0A96D] mb-4 animate-bounce">
            ✨ かんせい！ ✨
          </h2>
          
          {/* ★クリアタイムの表示 */}
          <div className="bg-[#F4F1DE] px-6 py-3 rounded-xl mb-6 shadow-inner border-2 border-[#E0A96D]/30">
            <p className="text-2xl md:text-3xl text-[#3D405B] font-bold">
              きろく： <span className="text-[#E07A5F] text-4xl">{timeTaken}</span> びょう
            </p>
          </div>

          <p className="text-xl md:text-2xl text-[#3D405B] font-bold mb-8">
            はっけん！ よく かんさつ できましたね！
          </p>
          
          <div className="relative w-full max-h-[40vh] flex justify-center mb-10">
            <img 
              src={imageSrc} 
              className="max-w-full max-h-[40vh] object-contain rounded-xl shadow-[0_10px_30px_rgba(0,0,0,0.2)] border-8 border-white" 
              alt="かんせいがぞう" 
            />
          </div>

          <div className="flex flex-col sm:flex-row gap-4 w-full justify-center">
            <button 
              onClick={onRetry}
              className="px-6 py-4 bg-[#81B29A] text-white rounded-2xl font-bold text-xl shadow-[0_5px_0_#5a8570] hover:-translate-y-1 hover:shadow-[0_7px_0_#5a8570] active:translate-y-1 active:shadow-none transition-all"
            >
              もういちど<br/><span className="text-sm">（おなじしゃしん）</span>
            </button>
            <button 
              onClick={onReset}
              className="px-6 py-4 bg-white text-[#E0A96D] border-4 border-[#E0A96D] rounded-2xl font-bold text-xl shadow-[0_5px_0_#c99358] hover:-translate-y-1 hover:shadow-[0_7px_0_#c99358] active:translate-y-1 active:shadow-none transition-all"
            >
              ちがうしゃしんで<br/><span className="text-sm">あそぶ</span>
            </button>
          </div>
        </div>
      );
    }

    // ==========================================
    // メインコンポーネント（App）
    // ==========================================
    const App = () => {
      // 画面の切り替え状態 ('setup', 'playing', 'clear')
      const [gameState, setGameState] = useState('setup'); 
      const [imageSrc, setImageSrc] = useState(null);
      const [grid, setGrid] = useState({ rows: 4, cols: 4 }); // 初期値を4x4に変更
      const [allowOutside, setAllowOutside] = useState(false);
      const [clearTime, setClearTime] = useState(0); // ★クリアタイムを保存する状態

      return (
        // ★プレイ中(playing)の時は画面の高さを100dvhに固定し、スクロールを無効化する
        <div className={`w-full ${gameState === 'playing' ? 'h-[100dvh] overflow-hidden touch-none' : 'min-h-screen py-8 overflow-auto'} px-4 md:px-8 flex flex-col items-center`}>
          {gameState === 'setup' && (
            <SetupScreen 
              imageSrc={imageSrc} 
              setImageSrc={setImageSrc} 
              grid={grid} 
              setGrid={setGrid} 
              allowOutside={allowOutside}
              setAllowOutside={setAllowOutside}
              onStart={() => setGameState('playing')} 
            />
          )}
          {gameState === 'playing' && (
            <PuzzleBoard 
              imageSrc={imageSrc} 
              grid={grid} 
              allowOutside={allowOutside}
              onClear={(time) => {
                setClearTime(time); // ★かかった時間を保存
                setGameState('clear');
              }} 
              onBack={() => setGameState('setup')} 
            />
          )}
          {gameState === 'clear' && (
            <ClearScreen 
              imageSrc={imageSrc} 
              timeTaken={clearTime} // ★クリア画面に時間を渡す
              onRetry={() => setGameState('setup')} 
              onReset={() => {
                setImageSrc(null);
                setGameState('setup');
              }} 
            />
          )}
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
